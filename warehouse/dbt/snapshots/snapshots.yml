      - {name: account_business_key, description: Parent account business key.}
      - {name: platform, description: Source platform.}
      - {name: external_campaign_id, description: Platform-native campaign id.}
      - {name: campaign_name, description: Campaign name.}
      - {name: objective, description: Campaign objective.}
      - {name: status, description: Campaign status.}
      - {name: daily_budget, description: Daily budget.}
      - {name: lifetime_budget, description: Lifetime budget.}
      - {name: start_date, description: Start date.}
      - {name: end_date, description: End date.}
      - {name: bid_strategy, description: Bid strategy.}
      - {name: is_current, description: Source current marker for initial Phase 2 rows.}
      - {name: row_hash, description: Tracked attribute hash.}
      - {name: dbt_scd_id, description: dbt snapshot SCD id.}
      - {name: dbt_updated_at, description: dbt snapshot update timestamp.}
      - {name: valid_from, description: Snapshot validity start timestamp.}
      - {name: valid_to, description: Snapshot validity end timestamp.}
