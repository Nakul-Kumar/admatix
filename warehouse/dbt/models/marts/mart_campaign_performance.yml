version: 2

models:
  - name: mart_campaign_performance
    description: Denormalized campaign by day performance mart for cockpit reporting, with platform and first-party efficiency metrics.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [date_key, campaign_key]
    columns:
      - {name: date_key, description: Smart YYYYMMDD key for the metric date., tests: [not_null]}
      - {name: metric_date, description: Calendar date for the performance row.}
      - {name: account_key, description: Account dimension surrogate key., tests: [not_null]}
      - {name: tenant_id, description: Tenant UUID that owns the account., tests: [not_null]}
      - {name: platform, description: Platform enum code for the account.}
      - {name: external_account_id, description: Platform-native account identifier.}
      - {name: account_name, description: Human-readable account name.}
      - {name: platform_key, description: Platform dimension surrogate key., tests: [not_null]}
      - {name: platform_name, description: Human-readable platform name.}
      - {name: platform_family, description: Platform family such as search, social, or programmatic.}
      - {name: campaign_key, description: Campaign dimension surrogate key., tests: [not_null]}
      - {name: campaign_business_key, description: Stable conformed campaign business key.}
      - {name: external_campaign_id, description: Platform-native campaign identifier.}
      - {name: campaign_name, description: Human-readable campaign name.}
      - {name: objective, description: Campaign objective from the SCD-2 campaign dimension.}
      - {name: campaign_status, description: Campaign lifecycle status from the SCD-2 campaign dimension.}
      - {name: currency, description: ISO-4217 currency code for spend and platform revenue.}
      - {name: spend, description: Daily media spend from the spend fact.}
      - {name: impressions, description: Daily impressions from the spend fact.}
      - {name: clicks, description: Daily clicks from the spend fact.}
      - {name: platform_conversions, description: Daily platform-attributed conversions.}
      - {name: first_party_orders, description: First-party order count for the account and day.}
      - {name: platform_revenue, description: Daily platform-attributed revenue.}
      - {name: first_party_revenue, description: First-party revenue for the account and day.}
      - {name: gross_margin, description: First-party gross margin for the account and day.}
      - {name: new_customers, description: First-party new customer count for the account and day.}
      - {name: ctr, description: Click-through rate, clicks divided by impressions.}
      - {name: cvr, description: Conversion rate, platform conversions divided by clicks.}
      - {name: platform_roas, description: Platform-attributed revenue divided by spend.}
      - {name: first_party_roas, description: First-party revenue divided by spend.}
      - {name: cac, description: Customer acquisition cost, spend divided by platform conversions.}
      - {name: mer, description: Media efficiency ratio, spend divided by first-party revenue.}
      - {name: _loaded_at, description: Timestamp when the mart row was materialized.}
