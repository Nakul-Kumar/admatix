  - name: bronze_sim_events
    description: Empty Phase 2 bronze-compatible view for simulator events until WP-Q writes events.
    columns:
      - name: bronze_id
        description: Surrogate bronze row id.
        tests: [unique]
      - name: scenario_id
        description: Simulator scenario id.
      - name: sim_campaign_id
        description: Simulator campaign id.
      - name: event_type
        description: Simulator event type.
      - name: event_ts
        description: Event timestamp.
      - name: user_key
        description: Synthetic user key.
      - name: treatment_arm
        description: Treatment arm.
      - name: spend
        description: Event spend.
      - name: revenue
        description: Event revenue.
