        description: Load timestamp.
      - name: _source
        description: Logical source.
      - name: _batch_id
        description: Batch identifier.
      - name: _row_hash
        description: Stable row hash.
  - name: bronze_platform_metrics
    description: Bronze view over fixture plus live raw platform metric rows preserving ingest metadata.
    columns:
      - name: bronze_id
        description: Deterministic surrogate row number for fixture bronze rows.
        tests: [not_null, unique]
      - name: platform
        description: Source platform identifier.
        tests: [not_null]
      - name: external_account_id
        description: Platform-native account identifier.
      - name: campaign_external_id
        description: Platform-native campaign identifier.
      - name: metric_date
        description: Date the platform metrics cover.
      - name: spend
        description: Spend reported by the platform.
      - name: impressions
        description: Impressions reported by the platform.
      - name: clicks
        description: Clicks reported by the platform.
      - name: conversions
        description: Conversions reported by the platform.
      - name: platform_revenue
        description: Platform-attributed revenue; directional only.
      - name: currency
        description: ISO-4217 currency code.
      - name: raw
        description: Lossless JSON representation of the seed row.
      - name: _loaded_at
        description: Timestamp the bronze view row is materialised.
      - name: _source
        description: Logical source identifier.
      - name: _batch_id
        description: Ingest batch identifier.
      - name: _row_hash
        description: Stable SHA-256 row hash for fixture deduplication.
      - name: connector_sync_id
        description: Live connector sync id when row comes from warehouse.raw_platform_reports; null for fixtures.
      - name: connector_import_manifest_id
        description: Import manifest id when row comes from a persisted CSV/manual/API import; null for fixtures.
  - name: bronze_first_party_orders
    description: Bronze view over fixture plus live raw first-party conversion/order rows preserving ingest metadata.
    columns:
      - name: bronze_id
        description: Deterministic surrogate row number for fixture bronze rows.
        tests: [not_null, unique]
      - name: external_account_id
        description: Account or store identifier.
      - name: order_external_id
        description: Source-native order id.
      - name: order_ts
        description: UTC order timestamp.
      - name: customer_key
        description: Hashed customer identifier.
      - name: revenue
        description: Order revenue.
      - name: gross_margin
        description: Order gross margin.
      - name: currency
        description: ISO-4217 currency code.
      - name: channel
        description: Order channel.
      - name: is_new_customer
        description: One when the customer is new.
      - name: raw
        description: Lossless JSON representation of the seed row.
      - name: _loaded_at
        description: Timestamp the bronze view row is materialised.
      - name: _source
        description: Logical source identifier.
      - name: _batch_id
        description: Ingest batch identifier.
      - name: _row_hash
        description: Stable SHA-256 row hash for fixture deduplication.
      - name: connector_sync_id
        description: Live connector sync id when row comes from warehouse.raw_conversion_events; null for fixtures.
      - name: connector_import_manifest_id
        description: Import manifest id when row comes from a persisted CSV/manual/API import; null for fixtures.
  - name: bronze_raw_platform_reports
    description: Live bronze view over warehouse.raw_platform_reports. Not proof-ready by itself.
  - name: bronze_raw_conversion_events
    description: Live bronze view over warehouse.raw_conversion_events. Preferred first-party outcome source, but still not causal proof without an experiment.
  - name: bronze_creative_metrics_fixture
    description: Bronze view over Phase 2 fixture creative metric seed rows.
    columns:
      - name: bronze_id
        description: Deterministic surrogate row number for fixture bronze rows.
        tests: [not_null, unique]
      - name: platform
        description: Source platform identifier.
      - name: external_account_id
        description: Platform-native account identifier.
      - name: campaign_external_id
        description: Platform-native campaign identifier.
      - name: creative_external_id
        description: Platform-native creative identifier.
      - name: metric_date
        description: Date the creative metrics cover.
      - name: spend
        description: Spend reported for the creative.
      - name: impressions
        description: Impressions reported for the creative.
      - name: clicks
        description: Clicks reported for the creative.
      - name: conversions
        description: Conversions reported for the creative.
      - name: frequency
        description: Average creative frequency.
      - name: raw
        description: Lossless JSON representation of the seed row.
      - name: _loaded_at
        description: Timestamp the bronze view row is materialised.
      - name: _source
        description: Logical source identifier.
      - name: _batch_id
        description: Ingest batch identifier.
      - name: _row_hash
        description: Stable SHA-256 row hash for fixture deduplication.
