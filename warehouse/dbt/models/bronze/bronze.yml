version: 2

models:
  - name: bronze_criteo_uplift
    description: Empty Phase 2 bronze-compatible view for Criteo Uplift until WP-P ingestion lands.
    columns: &criteo_cols
      - name: bronze_id
        description: Surrogate bronze row id.
        tests: [unique]
      - name: f0
        description: Anonymised numeric feature 0.
      - name: f1
        description: Anonymised numeric feature 1.
      - name: f2
        description: Anonymised numeric feature 2.
      - name: f3
