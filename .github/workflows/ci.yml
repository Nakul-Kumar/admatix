name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/cx7-prod-hygiene-ci

permissions:
  contents: read

jobs:
  node:
    name: Node install, checks, and audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm exec turbo run test --concurrency=1

      - name: Build
        run: pnpm exec turbo run build

      - name: Scan secrets
        run: pnpm scan-secrets

      - name: Dependency audit
        run: pnpm audit:prod

  python-services:
    name: Python service pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip pytest==8.3.4

      - name: Run no-raw-dataset service tests
        run: pnpm test:python
