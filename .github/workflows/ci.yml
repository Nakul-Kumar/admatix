name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  node:
    name: Node install, checks, and audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm exec turbo run test --concurrency=1

      - name: Build
        run: pnpm exec turbo run build

      - name: Scan secrets
        run: pnpm scan-secrets

      - name: Dependency audit
        run: pnpm audit:prod

  python-services:
    name: Python service pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Node helper dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up ingest and simulator venvs
        run: pnpm run setup:python:core

      - name: Run ingest, simulator, and evidence smoke tests
        run: pnpm run test:python:core

      - name: Set up verifier venv
        run: pnpm run setup:python:verifier

      - name: Run verifier tests
        run: pnpm run test:python:verifier

      - name: Set up validation venv
        run: pnpm run setup:python:validation

      - name: Run validation fast tests
        run: pnpm run test:python:validation

  dashboard:
    name: Proof dashboard checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: proof-dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: proof-dashboard
        run: npm ci

      - name: Validate dashboard data origins
        working-directory: proof-dashboard
        run: npm run validate:origin

      - name: Check dashboard chart data contracts
        working-directory: proof-dashboard
        run: npm run check:data

      - name: Typecheck dashboard
        working-directory: proof-dashboard
        run: npm run typecheck

      - name: Build dashboard
        working-directory: proof-dashboard
        run: npm run build
